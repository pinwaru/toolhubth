<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เครื่องคิดเปอร์เซ็นต์ | ToolHub TH</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
margin:0;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
color:#2563eb;
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:18px;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:20px;
font-size:24px;
font-weight:bold;
color:#16a34a;
}
</style>

</head>

<body>

<div class="container">

<h1>🧮 เครื่องคิดเปอร์เซ็นต์</h1>

<p>คำนวณว่า X% ของ Y เท่ากับเท่าไร</p>

<input id="percent" type="number" placeholder="เปอร์เซ็นต์">

<input id="number" type="number" placeholder="ตัวเลข">

<button onclick="calculate()">คำนวณ</button>

<div class="result" id="result"></div>

</div>

<script>

function calculate(){

let p = Number(document.getElementById("percent").value);

let n = Number(document.getElementById("number").value);

let answer = (p*n)/100;

document.getElementById("result").innerHTML =
p + "% ของ " + n + " = " + answer;

}

</script>

</body>
</html>
