<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator | ToolHub TH</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;
padding:40px;
}

.container{

max-width:700px;

margin:auto;

background:white;

padding:30px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

}

h1{

color:#2563eb;

}

input{

width:100%;

padding:15px;

font-size:22px;

margin:20px 0;

border-radius:10px;

border:1px solid #ddd;

}

button{

padding:15px 25px;

font-size:18px;

background:#2563eb;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

margin-right:10px;

}

button:hover{

background:#1d4ed8;

}

</style>

</head>

<body>

<div class="container">

<h1>🔐 Password Generator</h1>

<p>สร้างรหัสผ่านแบบสุ่มที่ปลอดภัย</p>

<input id="password" readonly>

<button onclick="generate()">สร้างใหม่</button>

<button onclick="copyPassword()">คัดลอก</button>

</div>

<script>

function generate(){

const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

let password="";

for(let i=0;i<16;i++){

password+=chars.charAt(Math.floor(Math.random()*chars.length));

}

document.getElementById("password").value=password;

}

function copyPassword(){

const input=document.getElementById("password");

input.select();

document.execCommand("copy");

alert("คัดลอกรหัสผ่านแล้ว");

}

generate();

</script>

</body>
</html>
