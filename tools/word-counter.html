<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter | ToolHub TH</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
margin:0;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
color:#2563eb;
}

textarea{
width:100%;
height:220px;
padding:15px;
font-size:18px;
border-radius:10px;
border:1px solid #ddd;
resize:vertical;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#2563eb;
color:white;
padding:20px;
border-radius:12px;
text-align:center;
}

.card h2{
margin:0;
font-size:32px;
}

.card p{
margin-top:8px;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
background:#ef4444;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>📝 Word Counter</h1>

<p>นับจำนวนคำ ตัวอักษร และประโยคแบบเรียลไทม์</p>

<textarea id="text" placeholder="พิมพ์ข้อความที่นี่..." oninput="updateStats()"></textarea>

<div class="stats">

<div class="card">
<h2 id="words">0</h2>
<p>คำ</p>
</div>

<div class="card">
<h2 id="characters">0</h2>
<p>ตัวอักษร</p>
</div>

<div class="card">
<h2 id="sentences">0</h2>
<p>ประโยค</p>
</div>

</div>

<button onclick="clearText()">ล้างข้อความ</button>

</div>

<script>
function updateStats(){

let text=document.getElementById("text").value;

let words=text.trim()===""?0:text.trim().split(/\s+/).length;

let characters=text.length;

let sentences=text.split(/[.!?।\n]+/).filter(s=>s.trim()!="").length;

document.getElementById("words").innerHTML=words;
document.getElementById("characters").innerHTML=characters;
document.getElementById("sentences").innerHTML=sentences;

}

function clearText(){

document.getElementById("text").value="";
updateStats();

}

updateStats();
</script>

</body>
</html>
